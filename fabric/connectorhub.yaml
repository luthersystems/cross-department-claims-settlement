  #### WF5 CONNECTORS ####
  - name: ABSINBOUND
    # general_settings:
    #   use_runtime_injection: true
    
    http_inbound_rest:
      path_prefix: "/payment"
      target_endpoint: "update_payment_status_handler"
      # Use an inline OpenAPI so this is self-contained
      openapi_spec_inline: |
        openapi: 3.0.0
        info:
          title: ABS Payment Status Hook
          version: 1.0.0
        servers:
          - url: http://localhost:8090/payment
          - url: http://connectorhub_cdcs:8090/payment
        paths:
          /update-payment-status:
            post:
              operationId: absUpdatePaymentStatus
              summary: ABS tells us to generate payment for a claim
              requestBody:
                required: true
                content:
                  application/json:
                    schema:
                      type: object
                      required: [claimID, paymentID, status]
                      properties:
                        claimID:
                          type: string
                          example: C12345
                        paymentID:
                          type: string
                          example: P67890
                        status:
                          type: string
                          enum: [approved, rejected, pending]
                          example: approved
              responses:
                "200":
                  description: Acknowledged
                  content:
                    application/json:
                      schema:
                        type: object
                        properties:
                          ok:
                            type: boolean
                          received:
                            type: object
                            additionalProperties: true
      validate_responses: true
      max_body_bytes: 2097152
  - name: CONTRACTSIGNED
    http_inbound_rest:
      path_prefix: "/contract"
      target_endpoint: "contract_signed_handler"
      openapi_spec_inline: |
        openapi: 3.0.0
        info:
          title: Contract Signed Notification
          version: 1.0.0
        servers:
          - url: http://localhost:8090/contract
          - url: http://connectorhub_cdcs:8090/contract
        paths:
          /contract-signed:
            post:
              operationId: contractSigned
              summary: External system notifies us that a contract has been signed
              requestBody:
                required: true
                content:
                  application/json:
                    schema:
                      type: object
                      required: [claimID, signedBy]
                      properties:
                        claimID:
                          type: string
                          description: The claim ID to update
                          example: "42e038ce-6578-4867-97e2-ff6f821e3c88"
                        signedBy:
                          type: string
                          format: email
                          description: Email address of the person who signed the contract
                          example: "john.doe@example.com"
                        verifiedBy:
                          type: string
                          format: email
                          description: Email address of the person who verified the signature (optional)
                          example: "jack.clarke@luthersystems.com"
              responses:
                "200":
                  description: Contract signed notification received
                  content:
                    application/json:
                      schema:
                        type: object
                        properties:
                          claim_id:
                            type: string
                          state:
                            type: string
                          signed_by:
                            type: string
                          verified_by:
                            type: string
      validate_responses: true
      max_body_bytes: 2097152
  - name: PAYMENTSIGNED
    http_inbound_rest:
      path_prefix: "/invoice"
      target_endpoint: "notify_invoice_signed_handler"
      openapi_spec_inline: |
        openapi: 3.0.0
        info:
          title: Payment Signature Notification
          version: 1.0.0
        servers:
          - url: http://localhost:8090/invoice
          - url: http://connectorhub_cdcs:8090/invoice
        paths:
          /notify-invoice-signed:
            post:
              operationId: notifyInvoiceSigned
              summary: External system notifies us that invoice/payment has been signed/approved
              requestBody:
                required: true
                content:
                  application/json:
                    schema:
                      type: object
                      required: [claimID, signedBy]
                      properties:
                        claimID:
                          type: string
                          description: The claim ID to update
                          example: "42e038ce-6578-4867-97e2-ff6f821e3c88"
                        signedBy:
                          type: string
                          format: email
                          description: Email address of the person who signed/approved the payment
                          example: "payments@example.com"
              responses:
                "200":
                  description: Payment signature notification received
                  content:
                    application/json:
                      schema:
                        type: object
                        properties:
                          claim_id:
                            type: string
                          state:
                            type: string
                          signed_by:
                            type: string
      validate_responses: true
      max_body_bytes: 2097152
