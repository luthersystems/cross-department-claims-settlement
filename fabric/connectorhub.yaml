  #### WF5 CONNECTORS ####
  - name: ABSINBOUND
    # general_settings:
    #   use_runtime_injection: true
    inbound_rest:
      # Use an inline OpenAPI so this is self-contained
      openapi_spec_inline: |
        openapi: 3.0.0
        info:
          title: ABS Payment Status Hook
          version: 1.0.0
        paths:
          /allianz-business-system/update-payment-status:
            post:
              operationId: absUpdatePaymentStatus
              summary: ABS tells us to generate payment for a claim
              requestBody:
                required: true
                content:
                  application/json:
                    schema:
                      type: object
                      required: [claimID, paymentID, status]
                      properties:
                        claimID:
                          type: string
                          example: C12345
                        paymentID:
                          type: string
                          example: P67890
                        status:
                          type: string
                          enum: [approved, rejected, pending]
                          example: approved
              responses:
                "200":
                  description: Acknowledged
                  content:
                    application/json:
                      schema:
                        type: object
                        properties:
                          ok:
                            type: boolean
                          received:
                            type: object
                            additionalProperties: true
      path_prefix: /
      target_endpoint: update_payment_status_handler
      validate_responses: true
      max_body_bytes: 2097152
