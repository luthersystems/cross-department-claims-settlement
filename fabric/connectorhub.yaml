  #### WF2 CONNECTORS ####
  - name: OUTBOUNDGW
    mock: true
    general_settings:
      mock_settings:
        mock_settings:
          mock_responses:
            OUTBOUNDGW:
              getClaimDetails:
                __default__:
                  response: |
                    {
                      "claim_id": "CLM-4567",
                      "status": "UnderReview",
                      "policy_id": "POL-8872",
                      "handler": "ajones"
                    }
              updateClaimApproval:
                __default__:
                  response: |
                    {
                      "claim_id": "CLM-4567",
                      "approval": "ApprovedForSettlement",
                      "updated_at": "2025-11-04T12:30:00Z"
                    }
    outbound_rest:
      api_name: "GuidewireClaimCenter"
      base_url: "https://api.guidewire.example.com"
      auth_type: "none"
      openapi_spec: |
        openapi: 3.0.0
        info:
          title: Guidewire ClaimCenter API
          version: "1.0.0"
        servers:
          - url: https://api.guidewire.example.com
        paths:
          /claims/{claim_id}:
            get:
              operationId: getClaimDetails
              summary: Retrieve claim details
              parameters:
                - name: claim_id
                  in: path
                  required: true
                  schema:
                    type: string
              responses:
                "200":
                  description: Claim details retrieved successfully
                  content:
                    application/json:
                      schema:
                        type: object
                        properties:
                          claim_id:
                            type: string
                          status:
                            type: string
                            enum: [Open, UnderReview, Approved, Rejected, Closed]
                          policy_id:
                            type: string
                          handler:
                            type: string
          /claims/{claim_id}/approval:
            post:
              operationId: updateClaimApproval
              summary: Update claim approval status
              parameters:
                - name: claim_id
                  in: path
                  required: true
                  schema:
                    type: string
              requestBody:
                required: true
                content:
                  application/json:
                    schema:
                      type: object
                      properties:
                        approval:
                          type: string
                          enum: [ApprovedForSettlement, Rejected, Escalated]
                        approved_by:
                          type: string
              responses:
                "200":
                  description: Claim approval updated
                  content:
                    application/json:
                      schema:
                        type: object
                        properties:
                          claim_id:
                            type: string
                          approval:
                            type: string
                          updated_at:
                            type: string
                            format: date-time

