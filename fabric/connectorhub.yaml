  # 13 ABS (Rest In)
  - name: WEBHOOKRET
    http_inbound_post:
      path: "/allianz-business-system/update-payment-status/{invoice_id}"
      listener: "update_payment_status"
      request_id_template: "{listener}-{invoice_id}" # -> "update_payment_status-<uuid>"
      auth:
      - basic:
          username: "ops"
          password: "s3cret"
      - bearer:
          token: "super-long-token"
      - api_key:
          name: "X-API-Key"
          value: "abc123Header"
          in: API_KEY_IN_HEADER
      - api_key:
          name: "X-API-Key-cookie"
          value: "abc123Cookie"
          in: API_KEY_IN_COOKIE
      - api_key:
          name: "X-API-Key-query"
          value: "abc123Query"
          in: API_KEY_IN_QUERY
      body:
        - name: "claimID"
          type: BODY_PARAM_TYPE_STRING
          required: true

        - name: "paymentID"
          type: BODY_PARAM_TYPE_STRING
          required: true

        - name: "status"
          type: BODY_PARAM_TYPE_STRING
          required: true
          allowed_values:
            - "approved"
            - "rejected"
            - "pending"

