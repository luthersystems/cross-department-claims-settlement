service SandboxService {
  // ------------------------------------------------------------
  // WORKFLOW 1
  // ------------------------------------------------------------

  rpc UploadClaimWF1(pb.v1.UploadClaimWF1Request) returns (pb.v1.UploadClaimWF1Response) {
    option (google.api.http) = {
      post: "/v1/sandbox/UploadClaimWF1"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {tags: "Service"};
  }

  // ------------------------------------------------------------
  // WORKFLOW 2
  // ------------------------------------------------------------

  rpc UploadClaimWF2(pb.v1.UploadClaimWF2Request) returns (pb.v1.UploadClaimWF2Response) {
    option (google.api.http) = {
      post: "/v1/sandbox/UploadClaimWF2"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {tags: "Service"};
  }

  // ------------------------------------------------------------
  // WORKFLOW 3
  // ------------------------------------------------------------

  rpc UploadClaimWF3(pb.v1.UploadClaimWF3Request) returns (pb.v1.UploadClaimWF3Response) {
    option (google.api.http) = {
      post: "/v1/sandbox/UploadClaimWF3"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {tags: "Service"};
  }

  // ------------------------------------------------------------
  // WORKFLOW 4
  // ------------------------------------------------------------

  rpc UploadClaimWF4(pb.v1.UploadClaimWF4Request) returns (pb.v1.UploadClaimWF4Response) {
    option (google.api.http) = {
      post: "/v1/sandbox/UploadClaimWF4"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {tags: "Service"};
  }

  // ------------------------------------------------------------
  // WORKFLOW 5
  // ------------------------------------------------------------

  rpc UploadClaimWF5(pb.v1.UploadClaimWF5Request) returns (pb.v1.UploadClaimWF5Response) {
    option (google.api.http) = {
      post: "/v1/sandbox/UploadClaimWF5"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {tags: "Service"};
  }

  // ------------------------------------------------------------
  // UNIFIED PROCESS (WF1 → WF2 → WF3 → WF4 → WF5)
  // ------------------------------------------------------------

  rpc InvokeProcess(pb.v1.InvokeProcessRequest) returns (pb.v1.InvokeProcessResponse) {
    option (google.api.http) = {
      post: "/v1/sandbox/InvokeProcess"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {tags: "Service"};
  }
}
