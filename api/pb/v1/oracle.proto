// ------------------------------------------------------------
// WORKFLOW 1
// ------------------------------------------------------------

message UploadClaimWF1Request {
  string policy_id = 1;
}

message UploadClaimWF1Response {
  string claim_id = 1;
  string state = 2;

  oneof result {
    common.v1.Exception exception = 3;
  }
}

// ------------------------------------------------------------
// WORKFLOW 2
// ------------------------------------------------------------

message UploadClaimWF2Request {
  string policy_id = 1;
  string guidewire_claim_id = 2;
}

message UploadClaimWF2Response {
  string claim_id = 1;
  string state = 2;

  oneof result {
    common.v1.Exception exception = 3;
  }
}

// ------------------------------------------------------------
// WORKFLOW 3
// ------------------------------------------------------------

message UploadClaimWF3Request {
  string claim_id = 1;
  string invoice_amount = 2; // or double
  string signer_name = 3;
  string signer_email = 4;
  string originator_name = 5; // optional
  string recipient_name = 6; // optional
  string issue_date = 7; // YYYY-MM-DD
}

message UploadClaimWF3Response {
  string claim_id = 1;
  string state = 2;

  oneof result {
    common.v1.Exception exception = 3;
  }
}

// ------------------------------------------------------------
// WORKFLOW 4
// ------------------------------------------------------------

// Line item for Zoho invoice
message LineItem {
  string name = 1;
  double rate = 2;
  int32 quantity = 3;
}

message UploadClaimWF4Request {
  // Optional: defaults to "POL-8872" if not provided
  string policy_id = 1;
  // Zoho invoice fields
  string customer_id = 2; // Required: Zoho customer ID
  string reference_number = 3; // Required: Claim reference number (used as claim_id if claim_id not provided)
  string due_date = 4; // Required: Invoice due date (YYYY-MM-DD)
  bool is_inclusive_tax = 5; // Required: Whether tax is inclusive
  repeated LineItem line_items = 6; // Required: Invoice line items
  // Optional overrides
  string claim_id = 7; // Optional: Override claim_id (defaults to reference_number)
  string currency_code = 8; // Optional: Currency code (defaults to "GBP")
}

message UploadClaimWF4Response {
  string claim_id = 1;
  string state = 2;

  oneof result {
    common.v1.Exception exception = 3;
  }
}

// ------------------------------------------------------------
// WORKFLOW 5
// ------------------------------------------------------------

message UploadClaimWF5Request {
  string policy_id = 1;
}

message UploadClaimWF5Response {
  string claim_id = 1;
  string state = 2;

  oneof result {
    common.v1.Exception exception = 3;
  }
}

// ------------------------------------------------------------
// UNIFIED PROCESS (WF1 → WF2 → WF3 → WF4 → WF5)
// ------------------------------------------------------------

message InvokeProcessRequest {
  string policy_id = 1; // Required
  string guidewire_claim_id = 2; // Optional
  string gw_claim_id = 3; // Optional
  string signer_email = 4; // Optional
  string signer_name = 5; // Optional
  string invoice_amount = 6; // Optional
  string originator_name = 7; // Optional
  string recipient_name = 8; // Optional
  string issue_date = 9; // Optional (YYYY-MM-DD)
}

message InvokeProcessResponse {
  string claim_id = 1;
  string state = 2;

  oneof result {
    common.v1.Exception exception = 3;
  }
}

// ------------------------------------------------------------
// GET CLAIM STATE
// ------------------------------------------------------------

message GetClaimStateRequest {
  string claim_id = 1; // Required: Unique identifier of the claim
}

message GetClaimStateResponse {
  string claim_id = 1;
  string state = 2;

  oneof result {
    common.v1.Exception exception = 3;
  }
}
