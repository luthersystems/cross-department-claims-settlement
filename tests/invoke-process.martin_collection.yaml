name: "Cdcs: Unified Process - End-to-End Claim Settlement"
headers:
  - key: Content-Type
    value: application/json
tests:
  - name: "Invoke Complete Process"
    method: POST
    path: "v1/cdcs/InvokeProcess"
    body: |
      {
        "policy_id": "POL-8872",
        "guidewire_claim_id": "GW-CLM-12345",
        "signer_email": "john.doe@example.com",
        "signer_name": "John Doe",
        "invoice_amount": "2500.00",
        "originator_name": "Finance Department",
        "recipient_name": "Accounts Payable",
        "issue_date": "2024-01-15"
      }
    test_script: |
      pm.test("ok", () => {
          let data = pm.response.json();
          console.log(data);
          pm.response.to.have.status(200);
          pm.expect(data).to.not.have.property("exception");
          pm.expect(data).to.have.property("claim_id");
          pm.expect(data).to.have.property("state");
          pm.environment.set("CLAIM_ID", data.claim_id);
      });

