name: "Cdcs: Unified Process - End-to-End Claim Settlement"
headers:
  - key: Content-Type
    value: application/json
tests:
  - name: "Invoke Complete Process"
    method: POST
    path: "v1/cdcs/InvokeProcess"
    body: |
      {
        "policy_id": "POL-8872",
        "guidewire_claim_id": "GW-1001",
        "gw_claim_id": "GW-1001",
        "signer_email": "jack.clarke@luthersystems.com",
        "signer_name": "Jack Clarke",
        "invoice_amount": "25000.00",
        "originator_name": "Acme Insurance Ltd.",
        "recipient_name": "BlueRiver Underwriting Partners",
        "issue_date": "2025-11-12"
      }
    test_script: |
      pm.test("ok", (done) => {
          let data = pm.response.json();
          console.log(data);
          pm.response.to.have.status(200);
          pm.expect(data).to.not.have.property("exception");
          pm.expect(data).to.have.property("claim_id");
          pm.expect(data).to.have.property("state");
          pm.environment.set("CLAIM_ID", data.claim_id);
          // Small delay to allow async processing to start
          setTimeout(() => {
              console.log("Process invoked, waiting for async workflows to start...");
              done();
          }, 1000);
      });

  - name: "Wait up to 60s for WF4 WAITING_FOR_SIGNATURE"
    method: GET
    path: "v1/cdcs/workflows/process/claims/{{CLAIM_ID}}/state"
    test_script: |
      pm.test("Wait up to 60s for process to reach WF4 WAITING_FOR_SIGNATURE", (done) => {
          let maxAttempts = 30; // 60s
          let attempt = 0;
          let claimId = pm.environment.get("CLAIM_ID");
          let targetState = "WF4_CLAIM_STATE_WAITING_FOR_SIGNATURE";
          let lastState = "";
          let url = pm.environment.get("SCHEME") + "://" + pm.environment.get("SERVER") + "/v1/cdcs/workflows/process/claims/" + claimId + "/state";

          console.log(`Polling up to 60s for state: ${targetState}, claim_id: ${claimId}`);

          let checkState = () => {
              attempt++;
              pm.sendRequest({ url, method: "GET" }, (err, res) => {
                  if (!err && res && res.code === 200) {
                      try {
                          let data = res.json();
                          lastState = data.state || "";
                      } catch (e) {}
                  }

                  console.log(`Attempt ${attempt}/${maxAttempts}: ${lastState}`);

                  if (lastState === targetState) {
                      pm.environment.set("PROCESS_LAST_WAIT_STATE", lastState);
                      return done();
                  }

                  if (attempt >= maxAttempts) {
                      pm.environment.set("PROCESS_LAST_WAIT_STATE", lastState);
                      return done();
                  }

                  setTimeout(checkState, 2000);
              });
          };

          setTimeout(checkState, 2000);
      });

  - name: "Assert process reached WF4 WAITING_FOR_SIGNATURE"
    method: GET
    path: "v1/cdcs/workflows/process/claims/{{CLAIM_ID}}/state"
    test_script: |
      pm.test("Process reaches WF4 WAITING_FOR_SIGNATURE", () => {
          pm.response.to.have.status(200);
          let data = pm.response.json();
          console.log(data);
          pm.expect(data.state).to.equal("WF4_CLAIM_STATE_WAITING_FOR_SIGNATURE");
      });

  - name: "WF4: Contract Signed - External System Notifies Signature"
    method: POST
    path: "contract/contract-signed"
    setup_script: |
      pm.environment.set("OLD_SERVER", pm.environment.get("SERVER"));
      pm.environment.set("OLD_SCHEME", pm.environment.get("SCHEME"));
      pm.environment.set("SERVER", pm.environment.get("CONNECTORHUB_SERVER") || "connectorhub_cdcs:8090");
      pm.environment.set("SCHEME", "http");
    body: |
      {
        "workflow_name": "process",
        "claimID": "{{CLAIM_ID}}",
        "signedBy": "john.doe@example.com",
        "verifiedBy": "jack.clarke@luthersystems.com"
      }
    test_script: |
      pm.test("Contract signed notification received", () => {
          pm.response.to.have.status(200);
          pm.environment.set("SERVER", pm.environment.get("OLD_SERVER"));
          pm.environment.set("SCHEME", pm.environment.get("OLD_SCHEME"));
      });

  - name: "Wait up to 60s for WAITING_FOR_PAYMENT_SIGNATURE"
    method: GET
    path: "v1/cdcs/workflows/process/claims/{{CLAIM_ID}}/state"
    test_script: |
      pm.test("Wait up to 60s for process to reach WAITING_FOR_PAYMENT_SIGNATURE", (done) => {
          let maxAttempts = 30; // 60s
          let attempt = 0;
          let claimId = pm.environment.get("CLAIM_ID");
          let targetState = "CLAIM_STATE_WAITING_FOR_PAYMENT_SIGNATURE";
          let lastState = "";
          let url = pm.environment.get("SCHEME") + "://" + pm.environment.get("SERVER") + "/v1/cdcs/workflows/process/claims/" + claimId + "/state";

          console.log(`Polling up to 60s for state: ${targetState}, claim_id: ${claimId}`);

          let checkState = () => {
              attempt++;
              pm.sendRequest({ url, method: "GET" }, (err, res) => {
                  if (!err && res && res.code === 200) {
                      try {
                          let data = res.json();
                          lastState = data.state || "";
                      } catch (e) {}
                  }

                  console.log(`Attempt ${attempt}/${maxAttempts}: ${lastState}`);

                  if (lastState === targetState) {
                      pm.environment.set("PROCESS_LAST_PAYMENT_WAIT_STATE", lastState);
                      return done();
                  }

                  if (attempt >= maxAttempts) {
                      pm.environment.set("PROCESS_LAST_PAYMENT_WAIT_STATE", lastState);
                      return done();
                  }

                  setTimeout(checkState, 2000);
              });
          };

          setTimeout(checkState, 2000);
      });

  - name: "Assert process reached WAITING_FOR_PAYMENT_SIGNATURE"
    method: GET
    path: "v1/cdcs/workflows/process/claims/{{CLAIM_ID}}/state"
    test_script: |
      pm.test("Process reaches WAITING_FOR_PAYMENT_SIGNATURE", () => {
          pm.response.to.have.status(200);
          let data = pm.response.json();
          console.log(data);
          pm.expect(data.state).to.equal("CLAIM_STATE_WAITING_FOR_PAYMENT_SIGNATURE");
      });

  - name: "Payment Signature: External System Notifies Payment Signature"
    method: POST
    path: "invoice/notify-invoice-signed"
    setup_script: |
      pm.environment.set("OLD_SERVER", pm.environment.get("SERVER"));
      pm.environment.set("OLD_SCHEME", pm.environment.get("SCHEME"));
      pm.environment.set("SERVER", pm.environment.get("CONNECTORHUB_SERVER") || "connectorhub_cdcs:8090");
      pm.environment.set("SCHEME", "http");
    body: |
      {
        "workflow_name": "process",
        "claimID": "{{CLAIM_ID}}",
        "signedBy": "payments@example.com"
      }
    test_script: |
      pm.test("Payment signature notification received", () => {    
          pm.response.to.have.status(200);
          // Restore original SERVER and SCHEME
          pm.environment.set("SERVER", pm.environment.get("OLD_SERVER"));
          pm.environment.set("SCHEME", pm.environment.get("OLD_SCHEME"));
      });

  - name: "Wait up to 60s for PAYMENT_TEAM_NOTIFIED"
    method: GET
    path: "v1/cdcs/workflows/process/claims/{{CLAIM_ID}}/state"
    test_script: |
      pm.test("Wait up to 60s for process to reach PAYMENT_TEAM_NOTIFIED", (done) => {
          let maxAttempts = 30; // 60s
          let attempt = 0;
          let claimId = pm.environment.get("CLAIM_ID");
          let targetState = "CLAIM_STATE_PAYMENT_TEAM_NOTIFIED";
          let lastState = "";
          let url = pm.environment.get("SCHEME") + "://" + pm.environment.get("SERVER") + "/v1/cdcs/workflows/process/claims/" + claimId + "/state";

          console.log(`Polling up to 60s for state: ${targetState}, claim_id: ${claimId}`);

          let checkState = () => {
              attempt++;
              pm.sendRequest({ url, method: "GET" }, (err, res) => {
                  if (!err && res && res.code === 200) {
                      try {
                          let data = res.json();
                          lastState = data.state || "";
                      } catch (e) {}
                  }

                  console.log(`Attempt ${attempt}/${maxAttempts}: ${lastState}`);

                  if (lastState === targetState) {
                      pm.environment.set("PROCESS_LAST_FINAL_STATE", lastState);
                      return done();
                  }

                  if (attempt >= maxAttempts) {
                      pm.environment.set("PROCESS_LAST_FINAL_STATE", lastState);
                      return done();
                  }

                  setTimeout(checkState, 2000);
              });
          };

          setTimeout(checkState, 2000);
      });

  - name: "Verify Final State - PAYMENT_TEAM_NOTIFIED (Process Complete)"
    method: GET
    path: "v1/cdcs/workflows/process/claims/{{CLAIM_ID}}/state"
    test_script: |
      pm.test("Verify process reached final state", () => {
          // Process completes at PAYMENT_TEAM_NOTIFIED state
          // (WF5 is not part of the unified process flow)
          pm.response.to.have.status(200);
          let data = pm.response.json();
          let state = data.state || "";
          console.log(`Final state: ${state}`);
          
          pm.expect(state).to.equal("CLAIM_STATE_PAYMENT_TEAM_NOTIFIED");
          pm.expect(data).to.have.property("claim_id");
          console.log(`✓ Process completed successfully. Final claim_id: ${data.claim_id}, state: ${state}`);
      });

