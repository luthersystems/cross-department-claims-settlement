# Configuration for a local fabric network.
services:
  cdcs_oracle:
    extends:
      file: common.yaml
      service: cdcs_oracle
    ports:
    - "8080:8080" # expose this for testing purposes
    - "9600:9600" # expose this for testing purposes
    environment:
    - CDCS_ORACLE_EMULATE_CC=false
    networks:
    - byfn
networks:
  byfn:
    name: byfn
    external: true
