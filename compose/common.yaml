# Common network configuration that is imported into all other compose
# configurations.
services:
  cdcs_oracle:
    image: cdcs/oracle
    container_name: cdcs_oracle
    expose:
      - "8080"
    environment:
      # NOTE: uncomment to forward your AWS creds into the container:
      #- AWS_ACCESS_KEY_ID
      #- AWS_SECRET_ACCESS_KEY
      #- AWS_SECURITY_TOKEN
      #- AWS_SESSION_TOKEN
      #- AWS_REGION
      - CDCS_ORACLE_VERBOSE=true
      - CDCS_ORACLE_PHYLUM_VERSION=${PHYLUM_VERSION-}
      # Forward OTLP configuration from environment, if configured.
      # e.g. "http://grafana:4317"
      - CDCS_ORACLE_OTLP_ENDPOINT
    command: ["start"]
    volumes:
      - ${PROJECT_DIR:-..}/phylum:/opt/phylum:ro
    restart: always
